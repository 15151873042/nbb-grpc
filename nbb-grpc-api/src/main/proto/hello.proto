syntax = "proto3";

option java_multiple_files = true;


package com.nbb.grpc.api.hello;

// 定义服务
service HelloService {
  // 定义rpc方法
  rpc sayHello (HelloDTO) returns (HelloVO);
  rpc sayHelloAgain (HelloDTO) returns (HelloVO);

}

// 定义请求参数实体类
message HelloDTO {
  string name = 1;
}

// 定义响应参数实体类
message HelloVO {
  string message = 1;
}
